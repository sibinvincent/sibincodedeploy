name: Build, Push & Deploy to EKS

on:
  push:
    branches:
      - master

env:
  DOCKER_IMAGE: sibinvin/sibin-nginx
  EKS_CLUSTER_NAME: syna-eks
  AWS_REGION: ap-south-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ Fix Node.js 24 deprecation warning

jobs:
  build-push-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────
      # 1. Checkout the repository
      # ──────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ──────────────────────────────────────────
      # 2. Set image tag using Git SHA (unique per commit)
      # ──────────────────────────────────────────
      - name: Set Image Tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────
      # 3. Log in to Docker Hub
      # ──────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ──────────────────────────────────────────
      # 4. Build & Push Docker image
      #    Tags: short-SHA  +  latest
      # ──────────────────────────────────────────
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6   # ✅ Upgraded from v5 → v6 (Node.js 24 native)
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.TAG }}
            ${{ env.DOCKER_IMAGE }}:latest

      # ──────────────────────────────────────────
      # 5. Configure AWS credentials
      # ──────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ──────────────────────────────────────────
      # 6. Update kubeconfig to point to your EKS cluster
      # ──────────────────────────────────────────
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      # ──────────────────────────────────────────
      # 7. Deploy to Kubernetes — rolling update
      #    Updates the container named "sibin-nginx"
      #    inside the deployment named "sibin-nginx"
      # ──────────────────────────────────────────
      - name: Deploy to EKS
        run: |
          kubectl set image deployment/sibin-nginx \
            sibin-nginx=${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.TAG }}

          kubectl rollout status deployment/sibin-nginx --timeout=120s

      # ──────────────────────────────────────────
      # 8. Confirm deployment
      # ──────────────────────────────────────────
      - name: Verify Deployment
        run: kubectl get pods -l app=sibin-nginx
